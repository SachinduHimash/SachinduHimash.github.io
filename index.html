<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Himash Peiris — Software Engineer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --cream: #F5F0E8;
      --warm-white: #FAFAF7;
      --charcoal: #1A1A1A;
      --ink: #2D2D2D;
      --muted: #6B6B6B;
      --accent: #2D6A4F;
      --accent-light: #52B788;
      --accent-pale: #D8F3DC;
      --border: #E0D9CE;
      --shadow: rgba(45,45,45,0.08);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--charcoal);
      overflow-x: hidden;
    }

    /* Noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Gradient orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(82,183,136,0.12) 0%, transparent 70%);
      top: -100px; left: -100px;
    }
    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(216,243,220,0.2) 0%, transparent 70%);
      bottom: 200px; right: -80px;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(245,240,232,0.5) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 48px;
      background: rgba(250,250,247,0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 22px;
      color: var(--charcoal);
      letter-spacing: -0.5px;
    }
    .nav-logo span { color: var(--accent); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 6px 8px;
    }

    .nav-link {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 8px 20px;
      border-radius: 100px;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .nav-link:hover, .nav-link.active {
      background: var(--charcoal);
      color: white;
    }

    .nav-cta {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--charcoal);
      color: white;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 100px;
      text-decoration: none;
      transition: all 0.2s ease;
      border: none;
      cursor: pointer;
    }
    .nav-cta:hover { background: var(--accent); transform: translateY(-1px); }

    /* HERO */
    #home {
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 48px 80px;
      overflow: hidden;
    }

    .hero-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-pale);
      border: 1px solid rgba(82,183,136,0.3);
      color: var(--accent);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease both;
    }
    .hero-badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent-light);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.3); }
    }

    .hero-photo-wrap {
      position: relative;
      margin-bottom: 36px;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    .hero-photo-ring {
      width: 200px; height: 200px;
      border-radius: 50%;
      background: var(--cream);
      border: 2px solid var(--border);
      overflow: hidden;
      position: relative;
      box-shadow: 0 20px 60px var(--shadow), 0 0 0 8px rgba(82,183,136,0.08);
    }

    .hero-photo-ring img {
      width: 100%; height: 100%;
      object-fit: cover;
      filter: grayscale(15%);
    }

    /* Circular text around photo */
    .circular-text {
      position: absolute;
      top: -30px; right: -60px;
      width: 120px; height: 120px;
    }

    .hero-name {
      font-family: 'Syne', sans-serif;
      font-size: clamp(52px, 7vw, 96px);
      font-weight: 800;
      line-height: 0.9;
      letter-spacing: -3px;
      color: var(--charcoal);
      margin-bottom: 16px;
      animation: fadeUp 0.6s ease 0.2s both;
    }
    .hero-name .accent { color: var(--accent); }

    .hero-title {
      font-size: 15px;
      font-weight: 400;
      color: var(--muted);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease 0.3s both;
    }
    .hero-title span {
      color: var(--accent-light);
      font-weight: 500;
    }

    .hero-desc {
      max-width: 560px;
      font-size: 16px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 40px;
      font-weight: 300;
      animation: fadeUp 0.6s ease 0.4s both;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      align-items: center;
      animation: fadeUp 0.6s ease 0.5s both;
    }

    .btn-primary {
      background: var(--charcoal);
      color: white;
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      border: none;
      cursor: pointer;
    }
    .btn-primary:hover { background: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(45,106,79,0.3); }

    .btn-secondary {
      background: transparent;
      color: var(--charcoal);
      padding: 14px 32px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { border-color: var(--charcoal); transform: translateY(-2px); }

    /* Social sidebar */
    .social-sidebar {
      position: fixed;
      left: 32px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 50;
    }

    .social-link {
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      color: var(--muted);
      text-decoration: none;
      transition: all 0.2s;
      border-radius: 8px;
    }
    .social-link:hover { color: var(--accent); transform: translateX(4px); }

    .social-line {
      width: 1px; height: 60px;
      background: var(--border);
      margin: 0 auto;
    }

    /* Brands strip */
    .brands-strip {
      position: relative;
      z-index: 1;
      margin-top: 60px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .brands-label {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 12px;
      white-space: nowrap;
    }

    .brand-tag {
      background: var(--cream);
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      padding: 6px 16px;
      border-radius: 100px;
    }

    /* SECTIONS COMMON */
    section {
      position: relative;
      z-index: 1;
      padding: 100px 48px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-label {
      font-size: 12px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 12px;
    }

    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 800;
      letter-spacing: -2px;
      color: var(--charcoal);
      line-height: 1;
      margin-bottom: 48px;
    }

    /* ABOUT */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 64px;
      align-items: start;
    }

    .about-text p {
      font-size: 16px;
      line-height: 1.8;
      color: var(--muted);
      font-weight: 300;
      margin-bottom: 20px;
    }

    .about-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 32px;
    }

    .stat-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: var(--charcoal);
      letter-spacing: -1px;
    }
    .stat-num span { color: var(--accent); }

    .stat-label {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* Education */
    .edu-block {
      margin-bottom: 24px;
    }

    .edu-card {
      background: var(--cream);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px 28px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }
    .edu-card:hover { border-color: var(--accent-light); transform: translateY(-2px); }

    .edu-school {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--charcoal);
      margin-bottom: 4px;
    }

    .edu-degree {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .edu-meta {
      display: flex;
      gap: 16px;
      font-size: 13px;
    }

    .edu-gpa {
      background: var(--accent-pale);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 100px;
      font-weight: 500;
    }

    .edu-year {
      color: var(--muted);
    }

    /* Skills */
    .skills-section {
      margin-top: 0;
    }

    .skill-group {
      margin-bottom: 32px;
    }

    .skill-group-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .skill-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .skill-tag {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      border: 1px solid var(--border);
      color: var(--ink);
      font-size: 14px;
      font-weight: 500;
      padding: 8px 16px;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .skill-tag:hover {
      border-color: var(--accent-light);
      background: var(--accent-pale);
      color: var(--accent);
      transform: translateY(-1px);
    }

    .skill-icon {
      width: 20px; height: 20px;
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
    }

    /* EXPERIENCE */
    .exp-list { display: flex; flex-direction: column; gap: 24px; }

    .exp-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .exp-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      background: var(--accent);
      border-radius: 3px 0 0 3px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .exp-card:hover::before { opacity: 1; }
    .exp-card:hover { border-color: var(--accent-light); transform: translateY(-2px); box-shadow: 0 8px 32px var(--shadow); }

    .exp-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .exp-role {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--charcoal);
    }

    .exp-period {
      font-size: 13px;
      color: var(--muted);
      background: var(--cream);
      padding: 4px 12px;
      border-radius: 100px;
      border: 1px solid var(--border);
      white-space: nowrap;
    }

    .exp-company {
      font-size: 15px;
      color: var(--accent);
      font-weight: 500;
      margin-bottom: 4px;
    }

    .exp-location {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .exp-projects { display: flex; flex-direction: column; gap: 16px; }

    .exp-project {
      padding: 16px;
      background: var(--cream);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .exp-project-name {
      font-size: 14px;
      font-weight: 600;
      color: var(--charcoal);
      margin-bottom: 8px;
    }

    .exp-bullets {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .exp-bullets li {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      padding-left: 16px;
      position: relative;
      font-weight: 300;
    }
    .exp-bullets li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--accent-light);
      font-size: 12px;
    }

    .exp-tech {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }

    .tech-chip {
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-pale);
      padding: 3px 10px;
      border-radius: 100px;
      letter-spacing: 0.3px;
    }

    /* PROJECTS */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }

    .project-card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }
    .project-card:hover {
      border-color: var(--accent-light);
      transform: translateY(-4px);
      box-shadow: 0 16px 48px var(--shadow);
    }

    .project-num {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      color: var(--border);
      line-height: 1;
      margin-bottom: 16px;
      letter-spacing: -2px;
    }

    .project-name {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--charcoal);
      margin-bottom: 10px;
    }

    .project-desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 16px;
      font-weight: 300;
    }

    .project-links {
      display: flex;
      gap: 8px;
      margin-top: auto;
    }

    .project-link {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }
    .project-link:hover { color: var(--charcoal); }

    /* CONTACT */
    #contact {
      text-align: center;
    }

    .contact-card {
      background: var(--charcoal);
      border-radius: 32px;
      padding: 80px 48px;
      position: relative;
      overflow: hidden;
    }

    .contact-card::before {
      content: '';
      position: absolute;
      top: -100px; right: -100px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(82,183,136,0.15) 0%, transparent 70%);
      border-radius: 50%;
    }

    .contact-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(40px, 6vw, 72px);
      font-weight: 800;
      color: white;
      letter-spacing: -2px;
      line-height: 1;
      margin-bottom: 20px;
    }
    .contact-title span { color: var(--accent-light); }

    .contact-sub {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      max-width: 480px;
      margin: 0 auto 40px;
      line-height: 1.7;
      font-weight: 300;
    }

    .contact-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: white;
      color: var(--charcoal);
      padding: 14px 28px;
      border-radius: 100px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
    }
    .contact-btn:hover { background: var(--accent-light); color: white; transform: translateY(-2px); }

    .contact-btn-outline {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .contact-btn-outline:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.4); }

    /* Footer */
    footer {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 32px 48px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .nav-links { display: none; }
      section { padding: 80px 20px; }
      #home { padding: 100px 20px 60px; }
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .projects-grid { grid-template-columns: 1fr; }
      .social-sidebar { display: none; }
      .contact-card { padding: 48px 24px; }
      .hero-name { letter-spacing: -2px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // SVG Icons
    const GithubIcon = () => (
      <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.929.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
      </svg>
    );
